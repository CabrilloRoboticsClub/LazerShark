- name: Installing extra packages needed by LazerShark with apt.
  apt:
    name:
      - ros-humble-tf2
      - ros-humble-tf2-py
      - ros-humble-tf2-ros
      - ros-humble-tf2-ros-py
      - docker.io
      - build-essential 
    state: present

- name: Installing Python packages in your home directory with pip.
  become: false
  pip:
    name:
      - setuptools==59.6.0
      - args==0.1.0
      - clint==0.5.1
      - pyftdi==0.57.1
      - pyserial==3.5
      - pyusb==1.3.1
      - pip==26.1
      - opencv-python==4.13.0.92
      - simple-pid==2.0.1
      - numpy==2.2.6
      - scipy==1.15.3
      - numpy-quaternion==2024.0.13
      - gitpython==3.1.49
      - git+https://github.com/CabrilloRoboticsClub/naviguider_simpleserial.git
      - git+https://github.com/CabrilloRoboticsClub/targetpoint_lib.git

